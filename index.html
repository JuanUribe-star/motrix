<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motrix Mobile</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f8fb;
}

/* CONTENIDO */
.main {
    padding: 15px;
    margin-bottom: 70px;
}

/* SECCIONES */
.seccion {
    display: none;
}

.activa {
    display: block;
}

/* TARJETAS */
.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* BOTONES */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

/* NAV BAR INFERIOR */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #0d47a1;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.navbar div {
    color: white;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
}

/* TEXTO */
h2 {
    color: #1976d2;
}
</style>
</head>

<body>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="seccion activa">
<div class="card">
<h2>Dashboard</h2>
<p><b>Kilometraje:</b> <span id="kmCard">0 km</span></p>
<p><b>Mantenimiento:</b> <span id="mantCard">N/A</span></p>
<p><b>Combustible:</b> <span id="combCard">N/A</span></p>
</div>
</div>

<!-- MOTO -->
<div id="moto" class="seccion">
<div class="card">
<h2>Tu Moto</h2>

<input id="marca" placeholder="Marca">
<input id="modelo" placeholder="Modelo">
<input id="anio" placeholder="Año">
<input id="placa" placeholder="Placa">

<input id="cilindraje" placeholder="Cilindraje">
<input id="combustible" placeholder="Combustible">
<input id="km" placeholder="Kilometraje">
<input id="mantenimiento" placeholder="Último mantenimiento">

<button onclick="guardar()">Guardar</button>
</div>
</div>

<!-- DATOS -->
<div id="datos" class="seccion">
<div class="card">
<h2>Calculadora</h2>

<input id="n1" placeholder="Número 1">
<input id="n2" placeholder="Número 2">
<input id="n3" placeholder="Número 3">

<button onclick="sumar()">Sumar</button>
<button onclick="promedio()">Promedio</button>

<h3 id="resultado"></h3>
</div>
</div>

<!-- CONTACTO -->
<div id="contacto" class="seccion">
<div class="card">
<h2>Contacto</h2>

<input id="nombre" placeholder="Nombre">
<input id="email" placeholder="Email">

<button onclick="enviar()">Enviar</button>
</div>
</div>

</div>

<!-- NAVBAR -->
<div class="navbar">
<div onclick="mostrar('dashboard')">🏠<br>Inicio</div>
<div onclick="mostrar('moto')">🏍<br>Moto</div>
<div onclick="mostrar('datos')">📊<br>Datos</div>
<div onclick="mostrar('contacto')">📩<br>Contacto</div>
</div>

<script>
function mostrar(id){
    document.querySelectorAll('.seccion').forEach(s => s.classList.remove('activa'));
    document.getElementById(id).classList.add('activa');
}

// GUARDAR DATOS
function guardar(){
    let data = {
        km: km.value,
        mantenimiento: mantenimiento.value,
        combustible: combustible.value
    };

    localStorage.setItem("motrix", JSON.stringify(data));

    kmCard.innerText = data.km + " km";
    mantCard.innerText = data.mantenimiento;
    combCard.innerText = data.combustible;

    alert("Guardado 🚀");
}

// CALCULADORA
function sumar(){
    resultado.innerText = (+n1.value + +n2.value + +n3.value);
}

function promedio(){
    resultado.innerText = ((+n1.value + +n2.value + +n3.value)/3);
}

// CONTACTO
function enviar(){
    if(nombre.value === "" || email.value === ""){
        alert("Completa los datos");
        return;
    }
    alert("Mensaje enviado ✅");
}

// CARGAR DATOS AL INICIAR
window.onload = function(){
    let data = JSON.parse(localStorage.getItem("motrix"));
    if(data){
        kmCard.innerText = data.km + " km";
        mantCard.innerText = data.mantenimiento;
        combCard.innerText = data.combustible;
    }
}
</script>

</body>
</html>
